name: Deploy Staging

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://mafia-game-staging.liske.workers.dev
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Run D1 migrations (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: d1 migrations apply mafia-game-staging-db --remote --env staging

      - name: Build with OpenNext
        run: pnpm build:cf

      - name: Deploy to staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy --env staging

      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mafia-game-staging.liske.workers.dev/)
          echo "Staging response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Staging smoke test failed!"
            exit 1
          fi
          echo "✅ Staging is live"
